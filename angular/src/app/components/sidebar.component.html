<aside
  class="bg-white border-r border-gray-200 shrink-0 h-full overflow-y-auto transition-all duration-300"
  [class.w-16]="collapsed"
  [class.w-64]="!collapsed"
>
  <div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      @if (!collapsed) {
        <span class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Pages</span>
      }
      <button
        (click)="onToggle()"
        class="p-2 rounded-lg hover:bg-gray-100 transition-colors"
        aria-label="Toggle sidebar"
      >
        @if (collapsed) {
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        } @else {
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        }
      </button>
    </div>

    <!-- Navigation -->
    <nav class="space-y-1">
      <a
        routerLink="/"
        routerLinkActive="bg-gray-100 text-gray-900 font-medium border-l-2 border-blue-600"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-100"
        [class.justify-center]="collapsed"
        [class.px-2]="collapsed"
        [class.py-2.5]="true"
        [class.px-4]="!collapsed"
        title="Registration"
      >
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        @if (!collapsed) {
          <span>Registration</span>
        }
      </a>
      <a
        routerLink="/contact"
        routerLinkActive="bg-gray-100 text-gray-900 font-medium border-l-2 border-blue-600"
        class="flex items-center gap-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-100"
        [class.justify-center]="collapsed"
        [class.px-2]="collapsed"
        [class.py-2.5]="true"
        [class.px-4]="!collapsed"
        title="Contact"
      >
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        @if (!collapsed) {
          <span>Contact</span>
        }
      </a>

      <!-- Settings section -->
      @if (!collapsed) {
        <div class="pt-4 mt-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 px-4">
            Settings
          </h2>
          <div class="px-4 space-y-4">
            <!-- Locale picker -->
            <div>
              <label
                for="locale-select"
                class="block text-xs font-medium text-gray-600 mb-1"
              >
                Locale
              </label>
              <select
                id="locale-select"
                [ngModel]="locale"
                (ngModelChange)="onLocaleChange($event)"
                class="w-full text-sm px-2 py-1.5 border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              >
                @for (loc of locales; track loc.code) {
                  <option [value]="loc.code">{{ loc.label }}</option>
                }
              </select>
            </div>

            <!-- Mode toggle -->
            <div>
              <span class="block text-xs font-medium text-gray-600 mb-1">
                Fill Mode
              </span>
              <div class="flex rounded-md overflow-hidden border border-gray-300">
                <button
                  type="button"
                  (click)="onModeChange('valid')"
                  class="flex-1 text-xs font-medium py-1.5 transition-colors"
                  [class.bg-blue-600]="mode === 'valid'"
                  [class.text-white]="mode === 'valid'"
                  [class.bg-white]="mode !== 'valid'"
                  [class.text-gray-600]="mode !== 'valid'"
                  [class.hover:bg-gray-50]="mode !== 'valid'"
                >
                  Valid
                </button>
                <button
                  type="button"
                  (click)="onModeChange('invalid')"
                  class="flex-1 text-xs font-medium py-1.5 transition-colors"
                  [class.bg-red-600]="mode === 'invalid'"
                  [class.text-white]="mode === 'invalid'"
                  [class.bg-white]="mode !== 'invalid'"
                  [class.text-gray-600]="mode !== 'invalid'"
                  [class.hover:bg-gray-50]="mode !== 'invalid'"
                >
                  Invalid
                </button>
              </div>
            </div>
          </div>
        </div>
      }
    </nav>
  </div>
</aside>
