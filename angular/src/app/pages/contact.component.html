<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-demo-banner sourceUrl="https://github.com/fillkit/demo/blob/main/angular/src/app/pages/contact.component.html"></app-demo-banner>
  <h1 class="text-3xl font-bold mb-2">Contact Us</h1>
  <p class="text-gray-600 mb-8">
    Have questions or feedback? Fill out the form below and we'll get back to
    you soon.
  </p>

  <form
    (ngSubmit)="onSubmit()"
    class="bg-white rounded-lg shadow-sm border border-gray-200 p-6"
  >
    <!-- Your Information -->
    <div class="mb-8">
      <h3 class="text-xl font-semibold mb-4">Your Information</h3>

      <div class="mb-4">
        <label
          for="name"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Full Name <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          id="name"
          name="name"
          autocomplete="name"
          [(ngModel)]="formData.name"
          required
          placeholder="John Doe"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-gray-700 mb-1"
          >
            Email Address <span class="text-red-500">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            [(ngModel)]="formData.email"
            required
            placeholder="john@example.com"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>

        <div>
          <label
            for="phone"
            class="block text-sm font-medium text-gray-700 mb-1"
          >
            Phone Number
          </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            autocomplete="tel"
            [(ngModel)]="formData.phone"
            placeholder="+1 (555) 123-4567"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
      </div>

      <div class="mb-4">
        <label
          for="company"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Company Name
        </label>
        <input
          type="text"
          id="company"
          name="company"
          autocomplete="organization"
          [(ngModel)]="formData.company"
          placeholder="Acme Inc."
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>
    </div>

    <!-- Your Message -->
    <div class="mb-8">
      <h3 class="text-xl font-semibold mb-4">Your Message</h3>

      <div class="mb-4">
        <label
          for="subject"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Subject <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          id="subject"
          name="subject"
          [(ngModel)]="formData.subject"
          required
          placeholder="What can we help you with?"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <div class="mb-4">
        <label
          for="message"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Message <span class="text-red-500">*</span>
        </label>
        <textarea
          id="message"
          name="message"
          [(ngModel)]="formData.message"
          required
          rows="6"
          placeholder="Tell us more about your inquiry..."
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-y"
        ></textarea>
      </div>

      <div class="mb-4">
        <label
          for="contactMethod"
          class="block text-sm font-medium text-gray-700 mb-1"
        >
          Preferred Contact Method
        </label>
        <select
          id="contactMethod"
          name="contactMethod"
          [(ngModel)]="formData.contactMethod"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
        >
          <option value="email">Email</option>
          <option value="phone">Phone</option>
          <option value="either">Either</option>
        </select>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex gap-4">
      <button
        type="submit"
        class="px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
      >
        Send Message
      </button>
      <button
        type="reset"
        class="px-6 py-2 bg-gray-200 text-gray-800 font-medium rounded-md hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition-colors"
      >
        Clear Form
      </button>
    </div>
  </form>
</div>
