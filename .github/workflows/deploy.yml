name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install hub dependencies (@fillkit/browser for HTML vendor UMD)
      - name: Install hub dependencies
        run: npm ci

      # Install framework dependencies in parallel
      - name: Install framework dependencies
        run: |
          cd react && npm ci &
          cd vue && npm ci &
          cd angular && npm ci &
          wait

      # Build all framework apps
      - name: Build React
        run: cd react && npm run build

      - name: Build Vue
        run: cd vue && npm run build

      - name: Build Angular
        run: cd angular && npm run build

      # Assemble into unified dist/ (copies @fillkit/browser UMD into html/vendor/)
      - name: Assemble dist
        run: node scripts/build-dist.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
