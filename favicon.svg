<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .fk-stroke { stroke: #1e40af; stroke-width: 2.5; stroke-linecap: round; }
    .fk-fill { fill: #1e40af; }
    .fk-line { stroke: #ffffff; stroke-width: 1.5; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .fk-stroke { stroke: #3b82f6; }
      .fk-fill { fill: #3b82f6; }
    }
  </style>

  <!-- X-cross -->
  <g class="fk-stroke" fill="none">
    <line x1="2" y1="2" x2="30" y2="30" />
    <line x1="30" y1="2" x2="2" y2="30" />
  </g>

  <!-- Center circle -->
  <circle class="fk-fill" cx="16" cy="16" r="7" />

  <!-- Three horizontal lines (form lines icon) -->
  <g class="fk-line" fill="none">
    <line x1="12.5" y1="13.5" x2="19.5" y2="13.5" />
    <line x1="12.5" y1="16" x2="19.5" y2="16" />
    <line x1="12.5" y1="18.5" x2="19.5" y2="18.5" />
  </g>
</svg>
